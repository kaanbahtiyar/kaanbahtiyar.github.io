{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->

<!-- Custom styling for projects cards, result banners, hardware chips -->
<style>
:root{
  --kb-ink:#0f172a;
  --kb-slate:#475569;
  --kb-line:#e2e8f0;
  --kb-accent:#0e7490;
  --kb-accent-tint:#ecfeff;
  --kb-surface:#ffffff;
  --kb-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}

/* ---------- Projects index: card grid ---------- */
.kb-projects{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:1.1rem;
  margin:1.5rem 0;
}
.kb-card{
  display:flex; flex-direction:column;
  border:1px solid var(--kb-line);
  border-radius:10px;
  background:var(--kb-surface);
  overflow:hidden;
  text-decoration:none !important;
  color:inherit;
  transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
}
.kb-card:hover{
  border-color:var(--kb-accent);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(15,23,42,.08);
  text-decoration:none !important;
}
.kb-card:focus-visible{ outline:3px solid var(--kb-accent); outline-offset:2px; }

.kb-thumb{
  width:100%; aspect-ratio:16/9; object-fit:cover; display:block;
  border-bottom:1px solid var(--kb-line); background:#f1f5f9; margin:0;
}

.kb-metric{
  background:var(--kb-accent-tint);
  border-bottom:1px solid var(--kb-line);
  padding:.85rem 1.1rem;
  display:flex; align-items:baseline; gap:.5rem; flex-wrap:wrap;
}
.kb-metric-num{
  font-size:1.9rem; font-weight:700; line-height:1;
  color:var(--kb-accent); font-variant-numeric:tabular-nums; letter-spacing:-.01em;
}
.kb-metric-label{ font-size:.82rem; color:var(--kb-slate); }

.kb-card-body{ padding:1rem 1.1rem 1.15rem; display:flex; flex-direction:column; gap:.55rem; }
.kb-card-title{ font-size:1.04rem; font-weight:650; margin:0; color:var(--kb-ink); line-height:1.3; }
.kb-card-desc{ font-size:.9rem; color:var(--kb-slate); margin:0; line-height:1.5; }

.kb-tags{ display:flex; flex-wrap:wrap; gap:.4rem; margin-top:auto; padding-top:.35rem; }
.kb-tags span{
  font-size:.72rem; font-weight:600; letter-spacing:.02em;
  color:var(--kb-slate); background:#f1f5f9;
  border:1px solid var(--kb-line); border-radius:999px; padding:.18rem .55rem;
}

/* ---------- Per-project page: headline result banner ---------- */
.kb-result{
  display:flex; align-items:center; gap:1.1rem;
  border-left:4px solid var(--kb-accent);
  background:var(--kb-accent-tint);
  border-radius:0 8px 8px 0;
  padding:.9rem 1.2rem;
  margin:1.1rem 0 1.2rem;
}
.kb-result-num{
  font-size:2.3rem; font-weight:750; line-height:1;
  color:var(--kb-accent); font-variant-numeric:tabular-nums; white-space:nowrap;
}
.kb-result-num small{ font-size:1.1rem; font-weight:600; margin-left:.08rem; }
.kb-result-text{ font-size:.96rem; color:var(--kb-ink); line-height:1.45; }
.kb-result-text strong{ font-weight:650; }

/* ---------- Per-project page: hardware / instrumentation chips ---------- */
.kb-hw{ margin:0 0 1.8rem; }
.kb-hw-eyebrow{
  display:block; font-size:.72rem; font-weight:700; letter-spacing:.09em;
  text-transform:uppercase; color:var(--kb-slate); margin-bottom:.5rem;
}
.kb-hw-chips{ display:flex; flex-wrap:wrap; gap:.45rem; }
.kb-hw-chips span{
  font-family:var(--kb-mono);
  font-size:.76rem; line-height:1.2; color:var(--kb-ink);
  background:var(--kb-surface);
  border:1px solid var(--kb-line); border-radius:6px;
  padding:.28rem .55rem;
}
.kb-hw-chips span::before{
  content:""; display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--kb-accent); margin-right:.45rem; vertical-align:middle;
}

/* ---------- Publications page: entries ---------- */
.kb-publist{ list-style:none; margin:1.2rem 0 2rem; padding:0; }
.kb-pub{
  border:1px solid var(--kb-line);
  border-left:4px solid var(--kb-accent);
  border-radius:0 10px 10px 0;
  background:var(--kb-surface);
  padding:.95rem 1.15rem;
  margin:0 0 .9rem;
}
.kb-pub-title{
  display:inline-block; font-size:1.02rem; font-weight:650; line-height:1.35;
  color:var(--kb-ink); text-decoration:none;
}
.kb-pub-title:hover{ color:var(--kb-accent); text-decoration:underline; }
.kb-pub-meta{
  font-family:var(--kb-mono); font-size:.78rem; color:var(--kb-slate);
  margin:.3rem 0 .45rem;
}
.kb-pub-summary{ font-size:.9rem; color:var(--kb-slate); line-height:1.5; margin:0 0 .6rem; }
.kb-pub-foot{ display:flex; flex-wrap:wrap; align-items:center; gap:.5rem; }
.kb-pub-proj{
  font-size:.74rem; font-weight:600; letter-spacing:.01em;
  color:var(--kb-accent); background:var(--kb-accent-tint);
  border:1px solid #cffafe; border-radius:999px; padding:.2rem .6rem;
  text-decoration:none;
}
.kb-pub-proj::before{ content:"\2197\00a0"; font-weight:700; }
.kb-pub-proj:hover{ text-decoration:underline; }
.kb-pub-link{
  font-size:.74rem; font-weight:600; color:var(--kb-slate);
  text-decoration:none; border-bottom:1px solid var(--kb-line);
}
.kb-pub-link:hover{ color:var(--kb-accent); }
.kb-pubgroup{ font-size:1.15rem; font-weight:700; color:var(--kb-ink);
  margin:1.8rem 0 .2rem; padding-bottom:.3rem; border-bottom:2px solid var(--kb-line); }

@media (max-width:480px){
  .kb-result{ flex-direction:column; align-items:flex-start; gap:.4rem; }
  .kb-result-num{ font-size:2rem; }
}
@media (prefers-reduced-motion: reduce){
  .kb-card{ transition:none; }
  .kb-card:hover{ transform:none; }
}

/* ---------- Homepage intro: availability banner + CV button ---------- */
.kb-intro{
  display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
  gap:.8rem; border:1px solid var(--kb-line); border-radius:10px;
  background:var(--kb-accent-tint); padding:.8rem 1.1rem; margin:0 0 1.5rem;
}
.kb-avail{ font-size:.92rem; font-weight:600; color:var(--kb-ink);
  display:flex; align-items:center; gap:.55rem; }
.kb-avail::before{
  content:""; flex:none; width:9px; height:9px; border-radius:50%;
  background:#16a34a; box-shadow:0 0 0 3px rgba(22,163,74,.2);
}
.kb-avail .sub{ font-weight:500; color:var(--kb-slate); }
.kb-btn{
  flex:none; display:inline-block;
  background:var(--kb-accent); color:#fff !important; text-decoration:none !important;
  font-size:.9rem; font-weight:650; padding:.5rem .95rem;
  border:1px solid var(--kb-accent); border-radius:8px; transition:background .15s ease;
}
.kb-btn:hover{ background:#0b5566; }
@media (max-width:520px){
  .kb-intro{ flex-direction:column; align-items:flex-start; }
  .kb-btn{ width:100%; text-align:center; }
}
</style>
